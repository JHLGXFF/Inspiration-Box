services:
  backend:
    build: ./backend
    container_name: inspiration-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/inspiration.db
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-in-prod}
    volumes:
      - ./backend/data:/data

  web:
    build: ./frontend
    container_name: inspiration-web
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "8080:80"
